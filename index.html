<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeedTest Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <div class="wrapper">
      <!-- GitHub Attribution -->
      <div class="github-bar">
        <a
          href="https://github.com/grchetan"
          target="_blank"
          class="github-btn"
          title="View on GitHub"
        >
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"
            />
          </svg>
          <span>grchetan</span>
        </a>
        <span class="made-by">Made by <strong>grchetan</strong></span>
      </div>

      <header>
        <h1>SpeedTest<span class="dot">.</span></h1>
        <p>NETWORK PERFORMANCE ANALYZER</p>
      </header>

      <!-- Gauge -->
      <div class="gauge-section">
        <div class="gauge-outer">
          <canvas id="gaugeCanvas" width="260" height="150"></canvas>
          <div class="gauge-center">
            <div class="gauge-speed" id="speedNum">0</div>
            <div class="gauge-unit" id="gaugeUnit">MBPS</div>
          </div>
        </div>
        <div class="phase-label" id="phaseLabel">Ready to test</div>
      </div>

      <!-- Progress -->
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>

      <!-- Stats -->
      <div class="stats">
        <div class="stat" id="statPing">
          <span class="stat-icon">📡</span>
          <div class="stat-label">Ping</div>
          <div class="stat-val" id="pingVal">—</div>
          <div class="stat-unit">MS</div>
        </div>
        <div class="stat" id="statDl">
          <span class="stat-icon">⬇</span>
          <div class="stat-label">Download</div>
          <div class="stat-val" id="dlVal">—</div>
          <div class="stat-unit" id="dlUnit">MBPS</div>
        </div>
        <div class="stat" id="statUl">
          <span class="stat-icon">⬆</span>
          <div class="stat-label">Upload</div>
          <div class="stat-val" id="ulVal">—</div>
          <div class="stat-unit" id="ulUnit">MBPS</div>
        </div>
      </div>

      <!-- Result -->
      <div class="result-row" id="resultRow"></div>

      <!-- Speed History Graph -->
      <div class="graph-section" id="graphSection" style="display: none">
        <div class="graph-header">
          <span class="graph-title">Speed History</span>
          <div class="graph-legend">
            <span class="leg dl">⬇ Download</span>
            <span class="leg ul">⬆ Upload</span>
          </div>
        </div>
        <canvas id="historyGraph" width="520" height="120"></canvas>
      </div>

      <!-- Start Button -->
      <button class="btn-start" id="btnStart" onclick="runTest()">
        ▶ &nbsp;Start Test
      </button>

      <!-- Footer -->
      <div class="info-footer">
        <div class="info-item">
          SERVER<span id="serverInfo">Auto-Select</span>
        </div>
        <div class="info-item">PROTOCOL<span>HTTPS / TCP</span></div>
        <div class="info-item">IP<span id="ipInfo">—</span></div>
      </div>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
